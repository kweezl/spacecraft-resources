<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SpaceCraft resources inspector</title>
  <!-- No build step: Tailwind + Vue (ESM) load from CDNs (needs internet). -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [v-cloak] { display: none; }
    .checker {
      background-image:
        linear-gradient(45deg, #d1d5db 25%, transparent 25%),
        linear-gradient(-45deg, #d1d5db 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #d1d5db 75%),
        linear-gradient(-45deg, transparent 75%, #d1d5db 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      background-color: #f3f4f6;
    }
    .flash-green { animation: flashGreen 1.2s ease-out 1; }
    @keyframes flashGreen {
      0%   { box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.9); }
      100% { box-shadow: 0 0 0 3px rgba(34, 197, 94, 0); }
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-800">
  <div id="app" v-cloak data-data-base="./generated"></div>
  <noscript>This inspector needs JavaScript.</noscript>
  <script type="module" src="./app.js"></script>
</body>
</html>
