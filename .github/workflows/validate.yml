name: validate

# Validates the committed release resources under generated/ and guards
# against raw game source ever being tracked. Installs the sc tool deps
# (typer, python-dotenv) so the command/CLI tests can import them.
on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: python -m ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Full history is unnecessary; the source-leak guard only inspects
          # the tracked files in this checkout via `git ls-files`.
          fetch-depth: 1
          # The icon sanity tests open the real WebP files, which are stored in
          # Git LFS — without this they are pointer stubs and PIL can't read them.
          lfs: true

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run test suite (unittest discovery)
        run: python -m unittest discover -s tests -t . -p "test_*.py" -v
