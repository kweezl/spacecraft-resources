name: validate

# Validates the committed release resources under generated/ and guards
# against raw game source ever being tracked. Pure-stdlib tests, no deps.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is unnecessary; the source-leak guard only inspects
          # the tracked files in this checkout via `git ls-files`.
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run test suite (unittest discovery)
        run: python -m unittest discover -p "test_*.py" -v
