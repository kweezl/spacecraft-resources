name: validate

# Validates the committed release resources under generated/ and guards
# against raw game source ever being tracked. Installs the sc tool deps
# (typer, python-dotenv) so the command/CLI tests can import them.
on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: python -m ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history is unnecessary; the source-leak guard only inspects
          # the tracked files in this checkout via `git ls-files`.
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run test suite (unittest discovery)
        run: python -m unittest discover -s tests -t . -p "test_*.py" -v
