name: Deploy inspector to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with LFS for icons)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          lfs: true
      - name: Assemble _site
        run: |
          mkdir -p _site/components _site/generated
          cp src/public/index.html src/public/app.js src/public/composables.js _site/
          cp src/public/components/*.js _site/components/
          cp -r generated/. _site/generated/
      # Inline what actions/upload-pages-artifact does internally, because that
      # composite action calls actions/upload-artifact@v4 *unpinned*, which the
      # org's "actions must be pinned to a full SHA" policy rejects. tar + a
      # SHA-pinned upload-artifact produces the same "github-pages" artifact.
      - name: Archive _site for Pages
        run: |
          tar --dereference --hard-dereference \
            --directory _site \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git --exclude=.github .
      - name: Upload Pages artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
