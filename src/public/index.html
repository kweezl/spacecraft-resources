<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SpaceCraft resources inspector</title>
  <!-- No build step: Tailwind + Vue (ESM) load from CDNs (needs internet). -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [v-cloak] { display: none; }

    /* Dark theme. The generated icons are mostly flat white, so light surfaces
       hid them. Surfaces are dark, text is off-white (not pure white). The
       components use a fixed set of light utility classes; remap them here so
       the whole app darkens without editing every component. */
    .bg-white { background-color: #1e293b !important; }      /* cards, header, table */
    .bg-slate-50 { background-color: #0f172a !important; }
    .bg-slate-100 { background-color: #334155 !important; }  /* chips */
    .bg-emerald-50 { background-color: #064e3b !important; } /* output rows */
    .bg-amber-50 { background-color: #3f2d12 !important; }   /* missing-icon row */
    .hover\:bg-slate-50:hover,
    .hover\:bg-slate-100:hover { background-color: #334155 !important; }
    .hover\:bg-emerald-100:hover { background-color: #065f46 !important; }
    .border-slate-100, .border-slate-200, .border-slate-300 { border-color: #334155 !important; }
    .divide-slate-100 > :not([hidden]) ~ :not([hidden]) { border-color: #334155 !important; }
    .text-slate-800 { color: #e2e8f0 !important; }
    .text-slate-700, .text-slate-600 { color: #cbd5e1 !important; }
    .text-slate-500, .text-slate-400, .text-slate-300 { color: #94a3b8 !important; }
    /* Form controls (the CDN reset leaves them light). */
    input, select, textarea { background-color: #0f172a; color: #e2e8f0; }
    option { background-color: #1e293b; color: #e2e8f0; }

    /* Icon tiles: a dark "main" backdrop so flat-white icons read clearly. */
    .checker {
      background-image:
        linear-gradient(45deg, #0b1220 25%, transparent 25%),
        linear-gradient(-45deg, #0b1220 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #0b1220 75%),
        linear-gradient(-45deg, transparent 75%, #0b1220 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      background-color: #243044;
    }
    .flash-green { animation: flashGreen 1.2s ease-out 1; }
    @keyframes flashGreen {
      0%   { box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.9); }
      100% { box-shadow: 0 0 0 3px rgba(34, 197, 94, 0); }
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-200">
  <div id="app" v-cloak data-data-base="./generated"></div>
  <noscript>This inspector needs JavaScript and must be served over HTTP (run <code>python sc.py serve</code>).</noscript>
  <script type="module" src="./app.js"></script>
</body>
</html>
